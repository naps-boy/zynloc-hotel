services:
  - type: web
    name: zynloc-hotel-api
    runtime: node
    plan: free
    buildCommand: npm install --workspace apps/api
    startCommand: node apps/api/src/index.js
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: NODE_TLS_REJECT_UNAUTHORIZED
        value: 0
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: CLIENT_URL
        value: https://zynloc-hotel.pages.dev
      - key: MAIL_FROM
        value: "Zynloc Hotel <no-reply@zynloc.local>"
